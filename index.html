<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-b from-blue-900 via-blue-950 to-blue-900 min-h-screen flex items-center justify-center">

  <div class="backdrop-blur-md bg-white/10 p-10 rounded-3xl shadow-2xl w-[95%] max-w-lg border border-white/20">

    <h1 class="text-4xl font-bold text-white text-center mb-8 drop-shadow-lg">Contact</h1>

    <form name="contact" method="POST" data-netlify="true" action="success.html" class="space-y-6">

      <input type="hidden" name="form-name" value="contact">

      <div>
        <label class="block mb-2 font-medium text-white">Your Name</label>
        <input type="text" name="name" placeholder="Your Name" required
          class="w-full px-5 py-3 rounded-xl bg-white/20 text-white placeholder-white border border-white/30 focus:outline-none focus:ring-2 focus:ring-blue-400 transition backdrop-blur-sm">
      </div>

      <div>
        <label class="block mb-2 font-medium text-white">Your Email</label>
        <input type="email" name="email" placeholder="Your Email" required
          class="w-full px-5 py-3 rounded-xl bg-white/20 text-white placeholder-white border border-white/30 focus:outline-none focus:ring-2 focus:ring-blue-400 transition backdrop-blur-sm">
      </div>

      <div>
        <label class="block mb-2 font-medium text-white">Your Message</label>
        <textarea name="message" rows="5" placeholder="Write your message..." required
          class="w-full px-5 py-3 rounded-xl bg-white/20 text-white placeholder-white border border-white/30 focus:outline-none focus:ring-2 focus:ring-blue-400 transition backdrop-blur-sm"></textarea>
      </div>

      <button type="submit"
        class="w-full py-3 rounded-xl bg-gradient-to-r from-blue-700 to-blue-900 text-white font-bold text-lg hover:from-blue-600 hover:to-blue-800 shadow-lg hover:shadow-2xl transition-all">
        Send Message
      </button>

    </form>

  </div>

</body>
</html>
