<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-r from-purple-500 via-pink-500 to-red-400 min-h-screen flex items-center justify-center">

  <div class="bg-white p-10 rounded-3xl shadow-2xl w-[95%] max-w-lg">
    
    <h1 class="text-3xl font-bold text-center mb-8 text-purple-700">Contact</h1>

    <form name="contact" method="POST" data-netlify="true" action="success.html" class="space-y-6">

      <input type="hidden" name="form-name" value="contact">

      <div>
        <label class="block mb-2 font-medium text-gray-700">Your Name</label>
        <input type="text" name="name" placeholder="Your Name" required
          class="w-full px-5 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition">
      </div>

      <div>
        <label class="block mb-2 font-medium text-gray-700">Your Email</label>
        <input type="email" name="email" placeholder="Your Email" required
          class="w-full px-5 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition">
      </div>

      <div>
        <label class="block mb-2 font-medium text-gray-700">Your Message</label>
        <textarea name="message" rows="5" placeholder="Write your message..." required
          class="w-full px-5 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition"></textarea>
      </div>

      <button type="submit"
        class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-purple-700 transition-all shadow-lg hover:shadow-xl">
        Send Message
      </button>

    </form>

  </div>

</body>
</html>
