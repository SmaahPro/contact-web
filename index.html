<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Me</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-r from-blue-500 to-cyan-400 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-[90%] max-w-md">
    
    <h1 class="text-2xl font-bold text-center mb-6">Contact Me</h1>

    <form name="contact" method="POST" data-netlify="true" class="space-y-4">

      <input type="hidden" name="form-name" value="contact">

      <div>
        <label class="block mb-1 font-medium">Your Name</label>
        <input type="text" name="name" placeholder="Your Name" required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block mb-1 font-medium">Your Email</label>
        <input type="email" name="email" placeholder="Your Email" required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block mb-1 font-medium">Your Message</label>
        <textarea name="message" rows="4" placeholder="Message" required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
      </div>

      <button type="submit"
        class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
        Send Message
      </button>

    </form>

  </div>

</body>
</html>
